<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#1c2b4a">
<title>Wirid 700 — Panel Guru</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1520;color:#d8e4f0;padding:10px;min-height:100vh;}
.wrap{max-width:680px;margin:0 auto;}
@keyframes fUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes tIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
.lg-c{background:#1c2b4a;border-radius:14px;padding:30px 22px;border:.5px solid rgba(212,175,55,.3);text-align:center;margin-top:60px;animation:fUp .3s ease;}
.lg-ar{font-family:'Amiri',serif;font-size:26px;color:#d4af37;margin-bottom:6px;}
.lg-t{font-size:20px;font-weight:500;color:#fff;margin-bottom:4px;}
.lg-s{font-size:12px;color:#8aaccc;margin-bottom:22px;}
.lg-i{width:100%;padding:13px;border:.5px solid rgba(255,255,255,.1);border-radius:8px;background:#0d1520;color:#fff;font-size:16px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:12px;}
.lg-i:focus{border-color:#d4af37;}
.lg-b{width:100%;padding:13px;background:#d4af37;color:#1c2b4a;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.lg-er{font-size:12px;color:#ef4444;margin-top:10px;display:none;}
.hd{background:#1c2b4a;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:.5px solid rgba(212,175,55,.3);display:flex;justify-content:space-between;align-items:center;}
.hd-ar{font-family:'Amiri',serif;font-size:17px;color:#d4af37;}
.hd-t{font-size:11px;color:#8aaccc;margin-top:1px;}
.hd-r{display:flex;gap:6px;}
.hbtn{padding:7px 13px;border:.5px solid rgba(212,175,55,.35);border-radius:20px;background:rgba(212,175,55,.07);color:#d4af37;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.hbtn svg{width:13px;height:13px;stroke:#d4af37;}
.hbtn.spin svg{animation:spin 1s linear infinite;}
.st{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.st-c{border-radius:10px;padding:13px 8px;text-align:center;}
.st-n{font-size:26px;font-weight:600;color:#fff;line-height:1;}
.st-l{font-size:9px;color:rgba(255,255,255,.75);margin-top:4px;line-height:1.3;}
.bg-e{background:#059669;}.bg-a{background:#d97706;}.bg-r{background:#dc2626;}.bg-b{background:#2563eb;}
.pdm{display:flex;gap:6px;margin-bottom:10px;}
.pd-c{flex:1;background:#162032;border-radius:10px;padding:11px 6px;text-align:center;border:.5px solid rgba(255,255,255,.07);}
.pd-c.g1{border-color:rgba(212,175,55,.5);background:rgba(212,175,55,.08);}
.pd-c.g2{border-color:rgba(192,192,192,.4);}
.pd-c.g3{border-color:rgba(180,83,9,.4);}
.pd-medal{font-size:22px;margin-bottom:4px;}
.pd-nm{font-size:11px;font-weight:600;color:#fff;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pd-hr{font-size:10px;color:#8aaccc;}
.fl{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.fb{padding:7px 14px;border:.5px solid rgba(255,255,255,.1);border-radius:20px;background:#162032;color:#8aaccc;font-size:11px;cursor:pointer;}
.fb.ak{background:#d4af37;color:#1c2b4a;border-color:#d4af37;font-weight:600;}
.src{flex:1;min-width:120px;padding:7px 14px;border:.5px solid rgba(255,255,255,.1);border-radius:20px;background:#162032;color:#fff;font-size:12px;outline:none;}
.ls{display:flex;flex-direction:column;gap:7px;}
.mb{background:#162032;border-radius:11px;padding:13px 14px;border:.5px solid rgba(255,255,255,.07);border-left:4px solid #6a88a6;animation:fUp .25s ease;}
.mb.s-ok{border-left-color:#059669;}
.mb.s-on{border-left-color:#d97706;}
.mb.s-no{border-left-color:#dc2626;}
.mb-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;gap:8px;}
.mb-nm{font-size:15px;font-weight:600;color:#fff;}
.mb-dt{font-size:10px;color:#6a88a6;margin-top:2px;}
.mb-bg{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:600;white-space:nowrap;}
.bg-ok{background:rgba(5,150,105,.15);color:#34d399;border:.5px solid rgba(5,150,105,.4);}
.bg-on{background:rgba(217,119,6,.15);color:#fbbf24;border:.5px solid rgba(217,119,6,.4);}
.bg-no{background:rgba(220,38,38,.15);color:#f87171;border:.5px solid rgba(220,38,38,.4);}
.mb-pr{height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.mb-pf{height:100%;border-radius:4px;transition:width .6s ease;}
.mb-met{display:flex;gap:14px;flex-wrap:wrap;}
.mm{font-size:11px;color:#8aaccc;}
.mm b{color:#d8e4f0;font-size:13px;}
.empty{text-align:center;padding:40px 20px;color:#6a88a6;font-size:13px;line-height:1.8;}
.lastup{text-align:center;font-size:10px;color:#6a88a6;padding:14px 0 6px;}
.adm-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#059669;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;display:none;animation:tIn .3s ease;white-space:nowrap;}
</style>
</head>
<body>
<div class="wrap">
<div id="lgn">
  <div class="lg-c">
    <div class="lg-ar">&#x648;&#x650;&#x631;&#x650;&#x62f;&#x652; &#x37;&#x30;&#x30;</div>
    <div class="lg-t">Panel Guru</div>
    <div class="lg-s">Sri Gayong Panglima Ulung &mdash; Pemantauan Mujahadah 41 Hari</div>
    <input type="password" id="pin" class="lg-i" placeholder="PIN" maxlength="6" inputmode="numeric">
    <button class="lg-b" onclick="login()">Masuk &#x279C;</button>
    <div class="lg-er" id="lgEr">PIN salah. Cuba lagi.</div>
  </div>
</div>
<div id="dash" style="display:none;">
  <div class="hd">
    <div>
      <div class="hd-ar">&#x648;&#x650;&#x631;&#x650;&#x62f;&#x652; &#x37;&#x30;&#x30; &mdash; Panel Guru</div>
      <div class="hd-t"><span id="ttl">0</span> ahli berdaftar</div>
    </div>
    <div class="hd-r">
      <button class="hbtn" onclick="eksportCSV()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>CSV
      </button>
      <button class="hbtn" id="rfB" onclick="muat()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Muat semula
      </button>
    </div>
  </div>
  <div class="st">
    <div class="st-c bg-e"><div class="st-n" id="sOk">0</div><div class="st-l">Selesai 41 Hari</div></div>
    <div class="st-c bg-a"><div class="st-n" id="sOn">0</div><div class="st-l">Sedang Berjalan</div></div>
    <div class="st-c bg-r"><div class="st-n" id="sNo">0</div><div class="st-l">Terputus</div></div>
    <div class="st-c bg-b"><div class="st-n" id="sAvg">0%</div><div class="st-l">Purata Kemajuan</div></div>
  </div>
  <div id="podium"></div>
  <div class="fl">
    <button class="fb ak" onclick="ftr('all',this)">Semua</button>
    <button class="fb" onclick="ftr('ok',this)">Selesai</button>
    <button class="fb" onclick="ftr('on',this)">Berjalan</button>
    <button class="fb" onclick="ftr('no',this)">Terputus</button>
    <input type="text" class="src" id="cari" placeholder="Cari nama..." oninput="render()">
  </div>
  <div class="ls" id="ls"></div>
  <div class="lastup" id="lup"></div>
</div>
</div>
<div class="adm-toast" id="admToast"></div>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwCTSqRSXdeFHObWUSz1WWEIqu88YS46ej-O7NgHcU3UadBfvmSCWkjuzsPsaQFdwQd/exec';
const PIN='4170';
var DATA=[],FILTER='all';

function login(){
  var v=document.getElementById('pin').value;
  if(v===PIN){
    sessionStorage.setItem('w700adm','1');
    document.getElementById('lgn').style.display='none';
    document.getElementById('dash').style.display='block';
    muat();
  } else {
    document.getElementById('lgEr').style.display='block';
    document.getElementById('pin').value='';
  }
}
document.getElementById('pin').addEventListener('keyup',function(e){if(e.key==='Enter')login();});

async function muat(){
  var b=document.getElementById('rfB');b.classList.add('spin');
  try{
    var r=await fetch(GAS_URL+'?t='+Date.now(),{
      method:'GET',
      credentials:'omit',
      redirect:'follow'
    });
    var txt=await r.text();
    try{DATA=JSON.parse(txt);}
    catch(je){DATA=[];}
    if(!Array.isArray(DATA))DATA=[];
    render();
    document.getElementById('lup').textContent='Kemaskini: '+new Date().toLocaleTimeString('ms-MY');
  }catch(e){
    document.getElementById('ls').innerHTML='<div class="empty" style="text-align:left;line-height:2"><b style="color:#f87171">Gagal sambung ke Google Sheet.</b><br><br>'+
      '&#x2022; Pastikan GAS dah deploy sebagai <b>Web App</b><br>'+
      '&#x2022; <b>Execute as:</b> Me<br>'+
      '&#x2022; <b>Who has access:</b> Anyone<br><br>'+
      '<a href="'+GAS_URL+'" target="_blank" style="color:#d4af37">&#x2794; Klik untuk test URL GAS</a><br><br>'+
      '<small style="color:#6a88a6">Jika terbuka JSON dalam tab baru = GAS OK,<br>masalah mungkin deployment settings.</small></div>';
  }
  b.classList.remove('spin');
}

function stKelas(s){
  s=(s||'').toString();
  if(s.includes('SELESAI'))return 'ok';
  if(s.includes('Terputus'))return 'no';
  return 'on';
}

function ftr(f,el){
  FILTER=f;
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('ak');});
  el.classList.add('ak');render();
}

function render(){
  var cari=(document.getElementById('cari').value||'').toLowerCase();
  var ok=0,on=0,no=0,sumK=0;
  DATA.forEach(function(d){
    var k=stKelas(d.status);
    if(k==='ok')ok++;else if(k==='no')no++;else on++;
    sumK+=parseInt(d.kemajuan)||0;
  });
  document.getElementById('ttl').textContent=DATA.length;
  document.getElementById('sOk').textContent=ok;
  document.getElementById('sOn').textContent=on;
  document.getElementById('sNo').textContent=no;
  document.getElementById('sAvg').textContent=DATA.length?Math.round(sumK/DATA.length)+'%':'0%';
  renderPodium();
  var list=DATA.filter(function(d){
    var k=stKelas(d.status);
    if(FILTER!=='all'&&k!==FILTER)return false;
    if(cari&&!(d.nama||'').toLowerCase().includes(cari))return false;
    return true;
  });
  list.sort(function(a,b){
    var ka=stKelas(a.status),kb=stKelas(b.status);
    var ord={on:0,ok:1,no:2};
    if(ord[ka]!==ord[kb])return ord[ka]-ord[kb];
    return(parseInt(b.hari)||0)-(parseInt(a.hari)||0);
  });
  if(!list.length){
    document.getElementById('ls').innerHTML='<div class="empty">Tiada ahli dalam kategori ini.<br>Ahli akan muncul selepas daftar dan<br>tekan "Hantar ke sistem guru" dalam app.</div>';
    return;
  }
  var h='';
  list.forEach(function(d){
    var k=stKelas(d.status);
    var kem=parseInt(d.kemajuan)||0;
    var pc=k==='ok'?'#059669':k==='no'?'#dc2626':'#d97706';
    var bgs=k==='ok'?'bg-ok':k==='no'?'bg-no':'bg-on';
    var stTxt=k==='ok'?'\u2705 Selesai':k==='no'?'\u274C Terputus':'\uD83D\uDD04 H-'+(d.hari||'?');
    h+='<div class="mb s-'+k+'">';
    h+='<div class="mb-top"><div><div class="mb-nm">'+esc(d.nama)+'</div>';
    h+='<div class="mb-dt">Daftar: '+esc(d.daftar)+' &nbsp;&middot;&nbsp; Sync: '+esc(d.terakhir)+'</div></div>';
    h+='<div class="mb-bg '+bgs+'">'+stTxt+'</div></div>';
    h+='<div class="mb-pr"><div class="mb-pf" style="width:'+kem+'%;background:'+pc+'"></div></div>';
    h+='<div class="mb-met">';
    h+='<div class="mm">Hari: <b>'+esc(d.hari)+'/41</b></div>';
    h+='<div class="mm">Streak: <b>'+esc(d.streak)+'</b></div>';
    h+='<div class="mm">Kemajuan: <b>'+kem+'%</b></div>';
    h+='</div></div>';
  });
  document.getElementById('ls').innerHTML=h;
}

function renderPodium(){
  var top=DATA.filter(function(d){return d.status;})
    .sort(function(a,b){return(parseInt(b.hari)||0)-(parseInt(a.hari)||0);})
    .slice(0,3);
  var pdv=document.getElementById('podium');
  if(!top.length||FILTER!=='all'){pdv.innerHTML='';return;}
  var medals=['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49'],cls=['g1','g2','g3'];
  pdv.innerHTML='<div class="pdm">'+top.map(function(d,i){
    return '<div class="pd-c '+cls[i]+'"><div class="pd-medal">'+medals[i]+'</div><div class="pd-nm">'+esc(d.nama)+'</div><div class="pd-hr">Hari '+(d.hari||'?')+'/41</div></div>';
  }).join('')+'</div>';
}

function eksportCSV(){
  var rows=[['Nama','Tarikh Daftar','Hari','Streak','Kemajuan','Status','Terakhir Sync']];
  DATA.forEach(function(d){
    rows.push([d.nama||'',d.daftar||'',d.hari||'',d.streak||'',d.kemajuan||'',d.status||'',d.terakhir||'']);
  });
  var csv=rows.map(function(r){
    return r.map(function(v){return '"'+(v+'').replace(/"/g,'""')+'"';}).join(',');
  }).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  var dt=new Date().toLocaleDateString('ms-MY').split('/').join('-');
  a.download='Wirid700_'+dt+'.csv';
  a.click();
  admToast('Laporan CSV berjaya dimuat turun!');
}

function admToast(msg){
  var t=document.getElementById('admToast');
  t.textContent=msg;t.style.display='block';
  clearTimeout(window._at);
  window._at=setTimeout(function(){t.style.display='none';},2500);
}

function esc(s){return(s===undefined||s===null)?'\u2014':(s+'').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

if(sessionStorage.getItem('w700adm')==='1'){
  document.getElementById('lgn').style.display='none';
  document.getElementById('dash').style.display='block';
  muat();
}
setInterval(function(){if(document.getElementById('dash').style.display!=='none')muat();},60000);
</script>
</body>
</html>
